<!DOCTYPE html>
<html>

<head><script src="/livereload.js?mindelay=10&amp;v=2&amp;port=61229&amp;path=livereload" data-no-instant defer></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css?family=IBM+Plex+Sans:300,300i,400,400i,700" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
    }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .header h1 {
      font-weight: 300;
      font-size: 2.4em;
      margin: 0 0 10px 0;
      letter-spacing: 0.04em;
    }

    .header p {
      font-size: 1em;
      color: #888;
      margin: 0;
    }

    .header {
      text-align: center;
      padding: 40px 32px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      padding: 0 4px;
    }

    .column {
      flex: 25%;
      padding: 0 4px;
    }

    .column img {
      margin-top: 8px;
      vertical-align: middle;
      width: 100%;
    }

    @media (min-width: 1200px) {
      .header {
        padding: 64px 32px;
      }

      .header h1 {
        font-size: 3em;
      }

      .header p {
        font-size: 1.15em;
      }
    }

    @media (max-width: 800px) {
      .column {
        flex: 50%;
      }
    }

    @media (max-width: 480px) {
      .column {
        flex: 100%;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <h1>Gallery</h1>
    <p>来时陌上初熏</p>
  </div>

  <!-- Photo Grid -->
  <div class="row">
    <div class="column">
      <img src="/img/gallery-1.jpg">
      <img src="/img/gallery-5.jpg">
      <img src="/img/gallery-9.jpg">
    </div>
    <div class="column">
      <img src="/img/gallery-2.jpg">
      <img src="/img/gallery-6.jpg">
      <img src="/img/gallery-10.jpg">
      <img src="/img/gallery-13.jpg">
    </div>
    <div class="column">
      <img src="/img/gallery-3.jpg">
      <img src="/img/gallery-7.jpg">
      <img src="/img/gallery-11.jpg">
    </div>
    <div class="column">
      <img src="/img/gallery-4.jpg">
      <img src="/img/gallery-8.jpg">
      <img src="/img/gallery-12.jpg">
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/medium-zoom@1/dist/medium-zoom.min.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      mediumZoom('.column img', {
        background: 'rgba(0,0,0,0.82)',
        margin: 24,
        scrollOffset: 0
      });
    });
  </script>

</body>

</html>
